<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --border: #d4cfc6;
    --text: #1a1814;
    --text2: #5a5550;
    --accent: #2d5a8e;
    --accent2: #c4581a;
    --code-bg: #1e1c18;
    --code-text: #e8e4dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: var(--bg);
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    height: 50px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    white-space: nowrap;
    margin-right: 0.5rem;
  }
  .logo span { color: #88aacc; }

  .sep { flex: 1; }
  .vsep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 0.2rem; }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.7rem;
    border: 1.5px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
    background: transparent;
  }
  .btn-ghost { border-color: rgba(245,242,236,0.3); color: var(--bg); }
  .btn-ghost:hover { background: rgba(245,242,236,0.1); border-color: rgba(245,242,236,0.6); }
  .btn-ghost.active { border-color: rgba(245,242,236,0.85); background: rgba(245,242,236,0.15); }
  .btn-accent { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-accent:hover { opacity: 0.85; }

  #file-input { display: none; }

  /* ── Workspace ── */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Left panel ── */
  #left-panel {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1.5px solid var(--border);
    background: var(--surface2);
    overflow: hidden;
    transition: width 0.2s;
  }
  body.preview-only #left-panel { width: 0; border: none; }

  /* Tabs */
  .tab-bar {
    display: flex;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.71rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.6rem 1rem;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
  .tab-panel.active { display: flex; }

  /* ── Paste tab ── */
  #tab-paste { flex-direction: column; }

  #md-input {
    flex: 1;
    width: 100%;
    min-height: 0;
    padding: 1.1rem 1.2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.75;
    background: var(--code-bg);
    color: var(--code-text);
    border: none;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  #md-input::placeholder { color: rgba(232,228,220,0.28); font-style: italic; }

  .paste-actions {
    display: flex;
    gap: 0.45rem;
    padding: 0.55rem 0.8rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  .btn-sm {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.67rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.28rem 0.6rem;
    border: 1.5px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    white-space: nowrap;
  }
  .btn-sm-ghost { border-color: var(--border); color: var(--text2); }
  .btn-sm-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-sm-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm-accent:hover { opacity: 0.85; }
  .pa-spacer { flex: 1; }

  /* ── File tab ── */
  #tab-file {
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 1rem;
    flex-direction: column;
  }

  .drop-zone {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(45,90,142,0.04); }
  .dz-icon { font-size: 2.2rem; opacity: 0.3; display: block; margin-bottom: 0.65rem; }
  .drop-zone p { font-family: 'IBM Plex Mono', monospace; font-size: 0.76rem; color: var(--text2); line-height: 1.9; margin: 0; }
  .drop-zone strong { color: var(--text); }

  .file-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.4rem 0.8rem;
    word-break: break-all;
    width: 100%;
    display: none;
  }
  .file-badge.show { display: block; }

  label.open-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.5rem 1.3rem;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
    display: inline-block;
  }
  label.open-btn:hover { opacity: 0.78; }

  /* ── Preview ── */
  #preview-pane {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem max(2rem, calc(50% - 36rem)) 4rem;
    background: var(--surface);
  }

  /* ── Empty state ── */
  #empty-state {
    text-align: center;
    padding: 6rem 2rem;
    color: var(--text2);
  }
  #empty-state .icon { font-size: 3rem; opacity: 0.1; display: block; margin-bottom: 1rem; }
  #empty-state p { font-size: 0.88rem; line-height: 2.1; }
  #empty-state code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    background: var(--surface2);
    padding: 0.1em 0.45em;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  /* ── Global drop overlay ── */
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(45,90,142,0.13);
    border: 3px dashed var(--accent);
    z-index: 300;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #drop-overlay.active { display: flex; }
  #drop-overlay span {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--accent);
    background: var(--surface);
    padding: 0.85rem 2rem;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  /* ── Markdown output ── */
  #output h1,#output h2,#output h3,#output h4,#output h5,#output h6 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    line-height: 1.35;
    margin-top: 2em;
    margin-bottom: 0.6em;
    color: var(--text);
  }
  #output h1 { font-size: 1.85rem; border-bottom: 2px solid var(--text); padding-bottom: 0.3em; margin-top: 0.4em; }
  #output h2 { font-size: 1.38rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
  #output h3 { font-size: 1.1rem; }
  #output h4 { font-size: 1rem; color: var(--text2); }
  #output p { line-height: 1.9; margin-bottom: 1em; }
  #output ul,#output ol { margin: 0.7em 0 1em 1.5em; }
  #output li { line-height: 1.8; margin-bottom: 0.2em; }
  #output a { color: var(--accent); text-underline-offset: 3px; }
  #output img { max-width: 100%; }
  #output blockquote {
    border-left: 3px solid var(--accent2);
    margin: 1.2em 0; padding: 0.5em 1.1em;
    background: var(--surface2); color: var(--text2); font-style: italic;
  }
  #output table { border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: 0.91em; }
  #output th { background: var(--text); color: var(--bg); padding: 0.5em 0.9em; text-align: left; font-family: 'IBM Plex Mono', monospace; font-size: 0.77rem; letter-spacing: 0.04em; }
  #output td { padding: 0.5em 0.9em; border-bottom: 1px solid var(--border); }
  #output tr:nth-child(even) td { background: var(--surface2); }
  #output hr { border: none; border-top: 1.5px solid var(--border); margin: 2em 0; }
  #output code {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.84em;
    background: var(--surface2); padding: 0.15em 0.4em;
    border-radius: 3px; border: 1px solid var(--border);
  }
  #output pre {
    background: var(--code-bg); color: var(--code-text);
    padding: 1.1em 1.3em; border-radius: 4px; overflow-x: auto;
    margin: 1.1em 0; font-size: 0.82rem; line-height: 1.65;
  }
  #output pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }

  .diagram-wrap {
    margin: 1.4em 0; padding: 1.25em 1.5em;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; text-align: center; overflow-x: auto;
  }
  .diagram-wrap img { max-width: 100%; }
  .diagram-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.67rem;
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 0.7em; text-align: left;
  }
  .katex-display { overflow-x: auto; margin: 1.2em 0; }

  /* ── Download toolbar ── */
  .diagram-wrap { position: relative; }
  .dl-toolbar {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .diagram-wrap:hover .dl-toolbar,
  .katex-display-wrap:hover .dl-toolbar { opacity: 1; }
  .dl-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0.2rem 0.45rem;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.12s;
  }
  .dl-btn:hover { opacity: 1; }

  /* KaTeX display wrapper */
  .katex-display-wrap {
    position: relative;
    margin: 1.2em 0;
  }
  .katex-display-wrap .katex-display { margin: 0; }

  /* ── Print ── */
  @media print {
    #left-panel, header { display: none !important; }
    body { background: white; height: auto; overflow: visible; }
    .workspace { overflow: visible; }
    #preview-pane { padding: 0; overflow: visible; }
  }
</style>
</head>
<body>

<div id="drop-overlay"><span>📄 ファイルをドロップ</span></div>

<header>
  <div class="logo">MD<span>·</span>VIEWER</div>

  <button class="btn btn-ghost active" id="btn-split">Split</button>
  <button class="btn btn-ghost" id="btn-preview">Preview</button>

  <div class="sep"></div>
  <div class="vsep"></div>

  <button class="btn btn-ghost" id="btn-dl-html">HTML</button>
  <button class="btn btn-ghost" id="btn-dl-md">MD</button>
  <button class="btn btn-accent" id="btn-print">PDF印刷</button>
</header>

<div class="workspace">

  <!-- Left panel -->
  <div id="left-panel">
    <div class="tab-bar">
      <button class="tab active" data-tab="paste">ペースト / 入力</button>
      <button class="tab" data-tab="file">ファイルを開く</button>
    </div>

    <!-- Paste tab -->
    <div class="tab-panel active" id="tab-paste">
      <textarea id="md-input" spellcheck="false"
        placeholder="# ここにMarkdownを貼り付け or 入力

\`\`\`mermaid
graph LR
  A --> B --> C
\`\`\`

$$E = mc^2$$

PlantUML・KaTeX・GFMテーブル対応。
Split モードでライブプレビューが使えます。"></textarea>
      <div class="paste-actions">
        <button class="btn-sm btn-sm-ghost" id="btn-clear">クリア</button>
        <button class="btn-sm btn-sm-ghost" id="btn-paste-clip">クリップボードから貼り付け</button>
        <div class="pa-spacer"></div>
        <button class="btn-sm btn-sm-accent" id="btn-render">レンダリング ▶</button>
      </div>
    </div>

    <!-- File tab -->
    <div class="tab-panel" id="tab-file">
      <div class="drop-zone" id="drop-zone">
        <span class="dz-icon">📄</span>
        <p><strong>.md ファイルをここにドロップ</strong><br>クリックしてもファイルを選択できます</p>
      </div>
      <div class="file-badge" id="file-badge"></div>
      <label class="open-btn" for="file-input">ファイルを選択…</label>
      <input type="file" id="file-input" accept=".md,.txt,.markdown">
    </div>
  </div>

  <!-- Preview -->
  <div id="preview-pane">
    <div id="output">
      <div id="empty-state">
        <span class="icon">⌘</span>
        <p>
          「ペースト / 入力」タブにMarkdownを貼り付けるか、<br>
          「ファイルを開く」タブで .md ファイルを読み込んでください。<br><br>
          <code>Mermaid</code>&ensp;<code>PlantUML</code>&ensp;<code>$KaTeX$</code>&ensp;<code>$$ブロック数式$$</code>
        </p>
      </div>
    </div>
  </div>

</div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'IBM Plex Mono, monospace' });

let rawMd = '';
let renderTimer = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Marked setup (plain) ──
marked.use({ breaks: true, gfm: true });

// ── Pre-process: extract mermaid/plantuml blocks before marked, restore after ──
// Two-pass approach: placeholder → marked.parse → replace placeholders with rendered HTML
const _diagramStore = {};

function preProcess(md) {
  _diagramStore._counter = 0;
  // Replace each ```mermaid or ```plantuml block with a unique placeholder
  // Use a non-greedy match that stops at the FIRST closing ``` on its own line
  return md.replace(/^(`{3})(mermaid|plantuml)([ \t]*)(\r?\n)([\s\S]*?)^\1[ \t]*(\r?\n|$)/gm,
    (_, fence, lang, _sp, _nl, code) => {
      const key = 'MERMAID-PLACEHOLDER-' + (_diagramStore._counter++);
      code = code.trimEnd();
      lang = lang.toLowerCase();
      if (lang === 'mermaid') {
        const id = 'mm-' + Math.random().toString(36).slice(2, 8);
        _diagramStore[key] = '<div class="diagram-wrap"><div class="diagram-label">Mermaid</div><div class="mermaid" id="' + id + '">' + esc(code) + '</div></div>';
      } else {
        const url = 'https://www.plantuml.com/plantuml/svg/' + encodePUML(code);
        _diagramStore[key] = '<div class="diagram-wrap"><div class="diagram-label">PlantUML</div><img src="' + url + '" alt="PlantUML" loading="lazy"></div>';
      }
      return '\n\n<mermaid-placeholder id="' + key + '"></mermaid-placeholder>\n\n';
    }
  );
}

function postProcess(html) {
  // Replace placeholder paragraphs <p>__DIAGRAM_N__</p> with actual diagram HTML
  return html.replace(/<mermaid-placeholder id="(MERMAID-PLACEHOLDER-\d+)"><\/mermaid-placeholder>/g, (_, key) => _diagramStore[key] || '');
}



// PlantUML
function encodePUML(src) {
  const raw = unescape(encodeURIComponent('@startuml\n' + src + '\n@enduml'));
  const comp = window.pako ? String.fromCharCode(...window.pako.deflateRaw(raw,{level:9})) : '~0'+raw;
  return encode64(comp);
}
function encode64(d) {
  const c='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_';
  let r='';
  for(let i=0;i<d.length;i+=3){
    const a=d.charCodeAt(i),b=d.charCodeAt(i+1)||0,cc=d.charCodeAt(i+2)||0;
    r+=c[a>>2]+c[((a&3)<<4)|(b>>4)]+c[((b&15)<<2)|(cc>>6)]+c[cc&63];
  }
  return r;
}

// ── Render ──
const EMPTY_HTML = document.getElementById('empty-state').outerHTML;

async function render() {
  const out = document.getElementById('output');
  if (!rawMd.trim()) { out.innerHTML = EMPTY_HTML; return; }
  out.innerHTML = postProcess(marked.parse(preProcess(rawMd)));
  renderMathInElement(out, {
    delimiters: [
      {left:'$$',right:'$$',display:true},
      {left:'$',right:'$',display:false},
      {left:'\\(',right:'\\)',display:false},
      {left:'\\[',right:'\\]',display:true},
    ],
    throwOnError: false,
  });
  try { await mermaid.run({ nodes: out.querySelectorAll('.mermaid') }); }
  catch(e){ console.warn('Mermaid:', e); }

  // Add download toolbars
  addMermaidToolbars(out);
  addKatexToolbars(out);
}

function addMermaidToolbars(out) {
  out.querySelectorAll('.diagram-wrap').forEach(wrap => {
    // Only mermaid wraps (not plantuml <img> wraps)
    const svgEl = wrap.querySelector('svg');
    if (!svgEl) return;
    if (wrap.querySelector('.dl-toolbar')) return; // already added

    const toolbar = document.createElement('div');
    toolbar.className = 'dl-toolbar';

    const btnSVG = document.createElement('button');
    btnSVG.className = 'dl-btn';
    btnSVG.textContent = 'SVG';
    btnSVG.title = 'SVGとしてダウンロード';
    btnSVG.onclick = () => downloadMermaidSVG(svgEl);

    const btnPNG = document.createElement('button');
    btnPNG.className = 'dl-btn';
    btnPNG.textContent = 'PNG';
    btnPNG.title = 'PNGとしてダウンロード';
    btnPNG.onclick = () => downloadMermaidPNG(svgEl);

    toolbar.appendChild(btnSVG);
    toolbar.appendChild(btnPNG);
    wrap.appendChild(toolbar);
  });
}

function addKatexToolbars(out) {
  // Wrap each .katex-display in a .katex-display-wrap and add toolbar
  out.querySelectorAll('.katex-display').forEach(kd => {
    if (kd.parentElement.classList.contains('katex-display-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'katex-display-wrap';
    kd.parentNode.insertBefore(wrap, kd);
    wrap.appendChild(kd);

    const toolbar = document.createElement('div');
    toolbar.className = 'dl-toolbar';

    const btnSVG = document.createElement('button');
    btnSVG.className = 'dl-btn';
    btnSVG.textContent = 'SVG';
    btnSVG.title = 'SVGとしてダウンロード';
    btnSVG.onclick = () => downloadKatexSVG(kd);

    toolbar.appendChild(btnSVG);
    wrap.appendChild(toolbar);
  });
}

// ── Download helpers ──

function getSVGString(svgEl) {
  // Clone so we can add xmlns etc without touching the live DOM
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  // Inline computed styles for fonts (basic)
  clone.style.background = 'white';
  return '<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML;
}

function downloadMermaidSVG(svgEl) {
  const str = getSVGString(svgEl);
  dl(new Blob([str], {type: 'image/svg+xml'}), 'diagram.svg');
}

function downloadMermaidPNG(svgEl) {
  const str = getSVGString(svgEl);
  const blob = new Blob([str], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  const w = svgEl.viewBox.baseVal.width || svgEl.getBoundingClientRect().width || 800;
  const h = svgEl.viewBox.baseVal.height || svgEl.getBoundingClientRect().height || 600;
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const scale = 2; // retina
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => dl(b, 'diagram.png'), 'image/png');
  };
  img.src = url;
}

function downloadKatexSVG(katexDisplayEl) {
  // KaTeX renders an inner <svg> for the math; grab it
  const svgEl = katexDisplayEl.querySelector('svg');
  if (svgEl) {
    downloadMermaidSVG(svgEl);
    return;
  }
  // Fallback: wrap the HTML in a foreign-object SVG
  const html = katexDisplayEl.innerHTML;
  const w = katexDisplayEl.scrollWidth + 20;
  const h = katexDisplayEl.scrollHeight + 20;
  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding:10px;">${html}</div>
  </foreignObject>
</svg>`;
  dl(new Blob([svg], {type:'image/svg+xml'}), 'formula.svg');
}

function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 320);
}

// ── Textarea ──
const mdInput = document.getElementById('md-input');
mdInput.addEventListener('input', function(){
  rawMd = this.value;
  if (!document.body.classList.contains('preview-only')) scheduleRender();
});

// Buttons
document.getElementById('btn-render').onclick = () => { rawMd = mdInput.value; render(); };
document.getElementById('btn-clear').onclick = () => { mdInput.value = ''; rawMd = ''; render(); };
document.getElementById('btn-paste-clip').onclick = async () => {
  try {
    const text = await navigator.clipboard.readText();
    mdInput.value = text; rawMd = text; render();
  } catch(e) {
    alert('クリップボードへのアクセスが拒否されました。\nCtrl+V で直接貼り付けてください。');
  }
};

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── File loading ──
function loadFile(file) {
  if (!file) return;
  new FileReader().onload = function(e) {
    rawMd = e.target.result;
    mdInput.value = rawMd;
    const badge = document.getElementById('file-badge');
    badge.textContent = '📄 ' + file.name;
    badge.classList.add('show');
    render();
    // Switch to paste tab so the loaded text is visible
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="paste"]').classList.add('active');
    document.getElementById('tab-paste').classList.add('active');
  };
  const fr = new FileReader();
  fr.onload = function(e){ rawMd = e.target.result; mdInput.value = rawMd; const badge=document.getElementById('file-badge'); badge.textContent='📄 '+file.name; badge.classList.add('show'); render(); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active')); document.querySelector('[data-tab="paste"]').classList.add('active'); document.getElementById('tab-paste').classList.add('active'); };
  fr.readAsText(file,'utf-8');
}

document.getElementById('file-input').addEventListener('change', e => loadFile(e.target.files[0]));

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('click', () => document.getElementById('file-input').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });

// Global drag
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('active'); });
document.addEventListener('dragleave', e => { if(!e.relatedTarget) document.getElementById('drop-overlay').classList.remove('active'); });
document.addEventListener('drop', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.remove('active'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

// ── View modes ──
document.getElementById('btn-split').onclick = function(){
  document.body.classList.remove('preview-only');
  this.classList.add('active'); document.getElementById('btn-preview').classList.remove('active');
};
document.getElementById('btn-preview').onclick = function(){
  document.body.classList.add('preview-only');
  this.classList.add('active'); document.getElementById('btn-split').classList.remove('active');
};

document.getElementById('btn-dl-html').onclick = () => {
  if(!rawMd.trim()) return;
  const body = document.getElementById('output').innerHTML;
  dl(new Blob([`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<style>${exportStyle}</style></head><body>${body}</body></html>`],{type:'text/html'}), 'rendered.html');

document.getElementById('btn-dl-md').onclick = () => {
  if(!rawMd) return;
  dl(new Blob([rawMd],{type:'text/markdown'}), 'document.md');
};

document.getElementById('btn-print').onclick = () => window.print();

function dl(blob, name){
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});
  a.click(); URL.revokeObjectURL(a.href);
}

ps.src = 'https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js';
